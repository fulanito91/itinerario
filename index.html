            { id: 88, unit: "VARIOS", question: "¿En qué situaciones es necesario solicitar una licencia de apertura?", options: ["a) Apertura por primera vez", "b) Traslados a otros locales", "c) Traspasos con variación de actividad", "d) Ampliación de locales"], correct: [0, 1, 2, 3], type: 'multi' },

            { id: 89, unit: "VARIOS", question: "¿Cuáles de las siguientes son competencias necesarias para un emprendedor?", options: ["a) Creatividad", "b) Resiliencia", "c) Conformismo", "d) Liderazgo"], correct: [0, 1, 3], type: 'multi' },

            { id: 90, unit: "VARIOS", question: "¿Qué características definen a un intraemprendedor?", options: ["a) Espíritu emprendedor", "b) Actitud pasiva", "c) Creatividad", "d) Resistencia al cambio"], correct: [0, 2], type: 'multi' },

            { id: 91, unit: "VARIOS", question: "¿Cuáles de los siguientes son factores del macroentorno?", options: ["a) Factores económicos", "b) Proveedores", "c) Factores políticos", "d) Clientes"], correct: [0, 2], type: 'multi' },

            { id: 92, unit: "VARIOS", question: "¿Cuáles de los siguientes elementos se consideran parte del pasivo no corriente?", options: ["a) Deudas a largo plazo", "b) Proveedores", "c) Acreedores", "d) Créditos a largo plazo"], correct: [0, 3], type: 'multi' },

            { id: 93, unit: "VARIOS", question: "¿Qué elementos son esenciales en un plan de negocio?", options: ["a) Análisis de mercado", "b) Propuesta de valor", "c) Estrategia de salida", "d) Plan de marketing"], correct: [0, 1, 2, 3], type: 'multi' },

            { id: 94, unit: "VARIOS", question: "¿Cuáles de los siguientes son niveles del producto según el marketing?", options: ["a) Producto básico", "b) Producto formal", "c) Producto ampliado", "d) Producto potencial"], correct: [0, 1, 2], type: 'multi' },

            { id: 95, unit: "VARIOS", question: "¿Qué información debe contener un recibo?", options: ["a) Número de recibo", "b) Nombre de quien libra el dinero", "c) Cantidad en letra y cifras", "d) Nombre y firma del receptor"], correct: [0, 1, 2, 3], type: 'multi' },

            { id: 96, unit: "VARIOS", question: "¿Qué tipos de comunicación existen según el texto?", options: ["a) Verbal, no verbal y escrita", "b) Formal e informal", "c) Vertical y horizontal", "d) Todas las anteriores"], correct: [3], type: 'multi' },

            { id: 97, unit: "VARIOS", question: "¿Cuáles son características de una incubadora de empresas?", options: ["a) Ofrece formación y asesoramiento", "b) Proporciona inversión directa", "c) Ayuda a materializar proyectos", "d) Ofrece espacios e infraestructuras"], correct: [0, 2, 3], type: 'multi' },

            { id: 98, unit: "VARIOS", question: "¿Cuáles son ejemplos de factores tecnológicos que afectan a una empresa?", options: ["a) Avances en producción", "b) Nuevas técnicas de gestión", "c) Innovación en productos", "d) Legislación fiscal"], correct: [0, 1, 2], type: 'multi' },

            { id: 99, unit: "VARIOS", question: "¿Cuáles son ejemplos de fuentes de financiación a largo plazo?", options: ["a) Empréstitos", "b) Préstamos hipotecarios", "c) Confirming", "d) Descuento comercial"], correct: [0, 1], type: 'multi' },

            { id: 100, unit: "VARIOS", question: "¿Qué elementos son significativos en la comunicación no verbal?", options: ["a) La mirada y la postura", "b) Los gestos de las manos y expresión facial", "c) La voz y el espacio personal", "d) Todos los anteriores"], correct: [3], type: 'multi' },

        ];



        function App() {

            const [currentIdx, setCurrentIdx] = useState(0);

            const [answers, setAnswers] = useState({});

            const [showResult, setShowResult] = useState(false);

            const [filterUnit, setFilterUnit] = useState('Todas');

            const [checkedMulti, setCheckedMulti] = useState({});



            const units = ['Todas', 'UD.1', 'UD.2', 'UD.3', 'UD.4', 'UD.5', 'UD.6', 'UD.7', 'UD.8', 'UD.9', 'VARIOS'];



            const filteredQuestions = useMemo(() => {

                return filterUnit === 'Todas' 

                    ? questionsData 

                    : questionsData.filter(q => q.unit === filterUnit);

            }, [filterUnit]);



            const currentQuestion = filteredQuestions[currentIdx] || filteredQuestions[0];



            const handleSingleAnswer = (optionIdx) => {

                if (showResult || answers[currentQuestion.id] !== undefined) return;

                setAnswers({ ...answers, [currentQuestion.id]: optionIdx });

            };



            const handleMultiAnswer = (optionIdx) => {

                if (showResult || checkedMulti[currentQuestion.id]) return;

                const currentSelections = answers[currentQuestion.id] || [];

                let newSelections;

                if (currentSelections.includes(optionIdx)) {

                    newSelections = currentSelections.filter(id => id !== optionIdx);

                } else {

                    newSelections = [...currentSelections, optionIdx];

                }

                setAnswers({ ...answers, [currentQuestion.id]: newSelections });

            };



            const checkMultiQuestion = () => {

                setCheckedMulti({ ...checkedMulti, [currentQuestion.id]: true });

            };



            const calculateScore = () => {

                let score = 0;

                filteredQuestions.forEach(q => {

                    const userAns = answers[q.id];

                    if (q.type === 'single') {

                        if (userAns === q.correct) score++;

                    } else {

                        const userSet = userAns || [];

                        const correctSet = q.correct;

                        const isExactlyCorrect = 

                            userSet.length === correctSet.length && 

                            correctSet.every(val => userSet.includes(val));

                        if (isExactlyCorrect) score++;

                    }

                });

                return score;

            };



            if (showResult) {

                const score = calculateScore();

                const percentage = ((score / filteredQuestions.length) * 100).toFixed(1);

                return (

                    <div className="p-4 md:p-12 max-w-2xl mx-auto">

                        <div className="bg-white rounded-[2.5rem] shadow-2xl p-10 text-center border border-slate-100">

                            <div className="bg-indigo-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">

                                <i data-lucide="award" className="w-12 h-12 text-indigo-600"></i>

                            </div>

                            <h1 className="text-3xl font-extrabold text-slate-900 mb-2">¡Cuestionario Terminado!</h1>

                            <p className="text-slate-500 mb-8 font-medium">Temario: {filterUnit}</p>

                            

                            <div className="grid grid-cols-2 gap-4 mb-8">

                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100">

                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Aciertos</p>

                                    <p className="text-4xl font-black text-indigo-600">{score} <span className="text-lg text-slate-300">/ {filteredQuestions.length}</span></p>

                                </div>

                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100">

                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Nota</p>

                                    <p className="text-4xl font-black text-emerald-500">{percentage}%</p>

                                </div>

                            </div>

                            

                            <button 

                                onClick={() => { setAnswers({}); setCheckedMulti({}); setShowResult(false); setCurrentIdx(0); }}

                                className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 text-lg"

                            >

                                <i data-lucide="refresh-cw" className="w-5 h-5"></i> Reiniciar Intento

                            </button>

                        </div>

                    </div>

                );

            }



            return (

                <div className="max-w-4xl mx-auto p-4 md:p-10">

                    {/* Header */}

                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">

                        <div>

                            <h1 className="text-3xl font-black text-slate-900 flex items-center gap-3">

                                <span className="bg-indigo-600 p-2 rounded-xl"><i data-lucide="list-checks" className="w-6 h-6 text-white"></i></span>

                                SIMULADOR FOL

                            </h1>

                        </div>

                        <div className="flex flex-wrap gap-1 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto max-w-full">

                            {units.map(u => (

                                <button

                                    key={u}

                                    onClick={() => { setFilterUnit(u); setCurrentIdx(0); setAnswers({}); setCheckedMulti({}); }}

                                    className={`px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${

                                        filterUnit === u ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'

                                    }`}

                                >

                                    {u}

                                </button>

                            ))}

                        </div>

                    </div>



                    {/* Card Pregunta */}

                    <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden relative">

                        <div className="h-2 bg-slate-100 w-full">

                            <div 

                                className="h-full bg-indigo-500 transition-all duration-500" 

                                style={{ width: `${((currentIdx + 1) / filteredQuestions.length) * 100}%` }}

                            />

                        </div>



                        <div className="p-8 md:p-12">

                            <div className="flex items-center justify-between mb-8">

                                <div className="flex items-center gap-3">

                                    <span className="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-xl text-xs font-black uppercase tracking-tighter">

                                        {currentQuestion.unit}

                                    </span>

                                    {currentQuestion.type === 'multi' && (

                                        <span className="px-4 py-1.5 bg-amber-50 text-amber-600 rounded-xl text-xs font-black uppercase tracking-tighter flex items-center gap-1.5">

                                            <i data-lucide="check-square" className="w-3.5 h-3.5"></i> Selección Múltiple

                                        </span>

                                    )}

                                </div>

                                <span className="text-sm font-bold text-slate-300">

                                    {currentIdx + 1} de {filteredQuestions.length}

                                </span>

                            </div>



                            <h2 className="text-xl md:text-2xl font-bold text-slate-900 leading-relaxed mb-10">

                                {currentQuestion.question}

                            </h2>



                            <div className="space-y-4">

                                {currentQuestion.options.map((opt, i) => {

                                    const userAns = answers[currentQuestion.id];

                                    const isSelected = currentQuestion.type === 'single' ? userAns === i : (userAns || []).includes(i);

                                    const isCorrect = currentQuestion.type === 'single' ? i === currentQuestion.correct : currentQuestion.correct.includes(i);

                                    const hasFinalized = currentQuestion.type === 'single' ? userAns !== undefined : checkedMulti[currentQuestion.id];



                                    let baseClass = "w-full text-left p-5 rounded-2xl border-2 transition-all flex items-center justify-between group ";

                                    let stateClass = "border-slate-100 hover:border-indigo-200 hover:bg-slate-50/50";

                                    

                                    if (isSelected) stateClass = "border-indigo-500 bg-indigo-50 ring-2 ring-indigo-100";

                                    if (hasFinalized) {

                                        if (isCorrect) stateClass = "border-emerald-500 bg-emerald-50 text-emerald-900";

                                        else if (isSelected) stateClass = "border-red-400 bg-red-50 text-red-900";

                                        else stateClass = "border-slate-50 opacity-40";

                                    }



                                    return (

                                        <button

                                            key={i}

                                            disabled={hasFinalized}

                                            onClick={() => currentQuestion.type === 'single' ? handleSingleAnswer(i) : handleMultiAnswer(i)}

                                            className={baseClass + stateClass}

                                        >

                                            <div className="flex items-center gap-5">

                                                <div className={`w-6 h-6 flex items-center justify-center shrink-0 border-2 rounded-lg transition-all ${isSelected ? 'bg-indigo-600 border-indigo-600' : 'border-slate-200 group-hover:border-indigo-300'}`}>

                                                    {isSelected && <i data-lucide="check" className="w-4 h-4 text-white"></i>}

                                                </div>

                                                <span className="font-semibold text-slate-700">{opt}</span>

                                            </div>

                                            {hasFinalized && isCorrect && <i data-lucide="check-circle" className="w-6 h-6 text-emerald-500 shrink-0"></i>}

                                            {hasFinalized && isSelected && !isCorrect && <i data-lucide="x-circle" className="w-6 h-6 text-red-500 shrink-0"></i>}

                                        </button>

                                    );

                                })}

                            </div>



                            {currentQuestion.type === 'multi' && !checkedMulti[currentQuestion.id] && (

                                <div className="mt-8 flex justify-center">

                                    <button 

                                        onClick={checkMultiQuestion}

                                        disabled={(answers[currentQuestion.id] || []).length === 0}

                                        className="px-10 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 disabled:opacity-30 transition-all flex items-center gap-2 shadow-lg shadow-indigo-100"

                                    >

                                        Comprobar respuestas

                                    </button>

                                </div>

                            )}

                        </div>



                        {/* Footer Nav */}

                        <div className="bg-slate-50 border-t border-slate-100 p-8 flex items-center justify-between">

                            <button

                                onClick={() => setCurrentIdx(Math.max(0, currentIdx - 1))}

                                disabled={currentIdx === 0}

                                className="flex items-center gap-2 text-slate-400 font-bold hover:text-indigo-600 disabled:opacity-20 transition-all p-2"

                            >

                                <i data-lucide="chevron-left" className="w-6 h-6"></i> Anterior

                            </button>



                            {Object.keys(answers).length >= filteredQuestions.length && (

                                <button

                                    onClick={() => setShowResult(true)}

                                    className="px-10 py-4 bg-emerald-500 text-white rounded-2xl font-black hover:bg-emerald-600 shadow-xl shadow-emerald-100 flex items-center gap-2"

                                >

                                    Ver Resultado Final <i data-lucide="arrow-right" className="w-5 h-5"></i>

                                </button>

                            )}



                            <button

                                onClick={() => setCurrentIdx(Math.min(filteredQuestions.length - 1, currentIdx + 1))}

                                disabled={currentIdx === filteredQuestions.length - 1}

                                className="flex items-center gap-2 text-slate-400 font-bold hover:text-indigo-600 disabled:opacity-20 transition-all p-2"

                            >

                                Siguiente <i data-lucide="chevron-right" className="w-6 h-6"></i>

                            </button>

                        </div>

                    </div>

                    

                    <footer className="mt-12 text-center text-slate-400">

                        <p className="text-sm font-semibold mb-1">Simulador Preparación Examen FOL</p>

                        <p className="text-xs opacity-75">Contiene 100 preguntas del temario oficial.</p>

                    </footer>

                </div>

            );

        }



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);



        // Initialize lucide icons whenever React updates the DOM

        window.setInterval(() => lucide.createIcons(), 500);

    </script>

</body>

</html>
